<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <title>MultiSchool - School Management SaaS Platform | Free Trial</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Apple iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MultiSchool">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    
    <!-- Android/Chrome Theme Color -->
    <meta name="theme-color" content="#0d4d3a">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a3829">
    
    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#0d4d3a">
    <meta name="msapplication-TileImage" content="/icons/icon-512x512.png">
    
    <!-- Disable automatic phone number detection -->
    <meta name="format-detection" content="telephone=no">
    
    <!-- Primary Meta Tags -->
    <meta name="description" content="MultiSchool - The complete school management SaaS platform. Manage students, fees, attendance, and finances in one place. Start free trial with 100 credits.">
    <meta name="keywords" content="school management software, student management system, fee collection, school ERP, education SaaS, school administration, multi-tenant school platform">
    <meta name="author" content="MultiSchool" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="language" content="English" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://multischool.app" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Nastaliq+Urdu:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://multischool.app" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="MultiSchool" />
    <meta property="og:title" content="MultiSchool - School Management SaaS Platform">
    <meta property="og:description" content="Complete school management software. Students, fees, attendance, accounts - all in one platform. Start free trial today.">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MultiSchool - School Management SaaS Platform">
    <meta name="twitter:description" content="Complete school management software. Students, fees, attendance, accounts - all in one platform. Start free trial today.">

    <!-- Structured Data - SaaS Application -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "MultiSchool",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free trial with 100 credits"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "150"
      },
      "featureList": "Student Enrollment, Fee Collection, Accounts Management, Teacher Management, Class Management, Reports, Mobile App"
    }
    </script>
    
    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "MultiSchool",
      "description": "Multi-tenant school management SaaS platform",
      "url": "https://multischool.app",
      "logo": "https://multischool.app/logo.png",
      "sameAs": []
    }
    </script>
    
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
